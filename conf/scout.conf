# /etc/scout/scout.conf
# scout — BlueyOS DHCP and DNS client
#
# The daemon runs in the foreground under claw and refreshes this host's
# resolver configuration from the current DHCP lease.

interface=eth0
hostname=
client_id=
lease_file=/var/lib/scout/lease
resolv_conf=/etc/resolv.conf
interfaces_file=/etc/interfaces
request_timeout=5
retry_interval=10
renew_margin=60
max_retries=0
persist_interfaces=yes
